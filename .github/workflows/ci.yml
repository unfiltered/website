name: ci
on:
  push:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'unfiltered' }}
    steps:
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: 17
        distribution: temurin
    - uses: actions/checkout@v7
    - uses: coursier/cache-action@v8
    - uses: sbt/setup-sbt@v1
    - run: sbt -v --server compile paradox
    - run: sudo apt-get install tree
    - run: tree target
    - id: generate_token
      if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: 89698
        private-key: ${{ secrets.UNFILTERED_APP_KEY }}
        repositories: |
          unfiltered.github.io
    - uses: actions/checkout@v7
      if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
      with:
        repository: unfiltered/unfiltered.github.io
        path: unfiltered.github.io
        token: ${{ steps.generate_token.outputs.token }}
    - if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
      run: |
        git config --global user.email "74865306+unfiltered-app[bot]@users.noreply.github.com"
        git config --global user.name "unfiltered-app[bot]"
        cp -r target/paradox/site/main/* unfiltered.github.io/
        cd unfiltered.github.io
        git add .
        if git commit -am "auto commit on CI https://github.com/unfiltered/website/commit/${{ github.sha }}"; then
          git push origin master
        fi
