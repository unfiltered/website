name: ci
on:
  push:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'unfiltered' }}
    steps:
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 17
        distribution: temurin
    - uses: actions/checkout@v6
    - uses: coursier/cache-action@v8
    - uses: sbt/setup-sbt@v1
    - run: sbt -v --server compile paradox
    - run: sudo apt-get install tree
    - run: tree target
    - uses: actions/checkout@v6
      with:
        repository: unfiltered/unfiltered.github.io
        path: unfiltered.github.io
    - uses: webfactory/ssh-agent@v0.10.0
      if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
      with:
        ssh-private-key: ${{ secrets.DEPLOY_KEY_1 }}
    - name: Push to gh-pages
      if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
      run: |
        git config --global user.email "74865306+unfiltered-app[bot]@users.noreply.github.com"
        git config --global user.name "unfiltered-app[bot]"
        cp -r target/paradox/site/main/* unfiltered.github.io/
        cd unfiltered.github.io
        git add .
        git commit -am "auto commit on CI https://github.com/unfiltered/website/commit/${{ github.sha }}"
        git push origin master
